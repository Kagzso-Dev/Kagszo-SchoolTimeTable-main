<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kagzso School — Timetable Portal</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f7f9fc; --fg:#1f2937; --muted:#6b7280; --brand:#2563eb; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--fg);font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:860px;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.06);overflow:hidden}
    .head{display:flex;gap:14px;align-items:center;padding:24px 28px;border-bottom:1px solid #eef2f7}
    .logo{font-size:34px}
    .title{font-weight:700;font-size:20px}
    .sub{font-size:13px;color:var(--muted);margin-top:2px}
    .grid{display:grid;gap:20px;padding:24px 28px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .tile{border:1px solid #eef2f7;border-radius:12px;padding:18px;transition:.15s all ease;cursor:pointer}
    .tile:hover{box-shadow:0 8px 18px rgba(37,99,235,.12);transform:translateY(-1px)}
    .tile h3{margin:0 0 6px 0;font-size:16px}
    .tile p{margin:0;color:var(--muted);font-size:13px}
    .cta{display:flex;gap:12px;flex-wrap:wrap;padding:0 28px 28px}
    .btn{appearance:none;border:none;border-radius:10px;padding:12px 16px;font-weight:600;cursor:pointer}
    .btn.primary{background:var(--brand);color:#fff}
    .btn.ghost{background:#f1f5ff;color:var(--brand)}
    @media (prefers-color-scheme: dark){
      :root{ --bg:#0b1220; --fg:#e5e7eb; --muted:#9aa4b2; --brand:#3b82f6 }
      .card{background:#0e172a;border:1px solid #1f2a44}
      .tile{border-color:#1f2a44;background:#0b1326}
      .btn.ghost{background:#0b1326;border:1px solid #1f2a44}
    }
  </style>
  <script>
    // Lightweight redirect to the user portal after a brief splash
    window.addEventListener('DOMContentLoaded', () => {
      const prefersReduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      setTimeout(() => { location.replace('/user/index.html'); }, prefersReduce ? 100 : 600);
    });
  </script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="logo">🏫</div>
        <div>
          <div class="title">Kagzso School</div>
          <div class="sub">Welcome to the Timetable Platform</div>
        </div>
      </div>
      <div class="grid">
        <a class="tile" href="/user/index.html">
          <h3>Open Timetable Portal</h3>
          <p>Browse class timetables, search, and apply for leave.</p>
        </a>
        <a class="tile" href="/admin/index.html">
          <h3>Admin Portal</h3>
          <p>Manage teachers, leaves, and publish timetables.</p>
        </a>
        <a class="tile" href="/user/index.html#apply-leave">
          <h3>Apply Leave</h3>
          <p>Teachers can quickly submit leave requests.</p>
        </a>
      </div>
      <div class="cta">
        <a class="btn primary" href="/user/index.html">Go to User Portal</a>
        <a class="btn ghost" href="/admin/index.html">Go to Admin Portal</a>
      </div>
    </div>
  </div>
</body>
</html>
